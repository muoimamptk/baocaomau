<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Báo Cáo Thị Trường</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(to bottom, #f8fafc, #e2e8f0); color: #0f172a; }
    .wrap { max-width: 460px; margin: 0 auto; padding: 16px; }
    .header { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
    .icon { width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #2563eb, #4338ca); color: white; font-weight: 700; font-size: 22px; box-shadow: 0 10px 20px rgba(37,99,235,0.25); }
    .title { font-size: 28px; font-weight: 700; margin: 0; }
    .subtitle { margin: 4px 0 0; color: #475569; font-size: 14px; }
    .card, .result, .footer-box { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 12px 24px rgba(15,23,42,0.08); }
    .card { padding: 16px; }
    .footer-box { margin-top: 18px; padding: 14px; text-align: center; color: #64748b; background: rgba(255,255,255,0.7); border-style: dashed; }
    .alert { display: none; border-radius: 18px; padding: 12px 14px; font-size: 14px; margin-bottom: 14px; }
    .alert.loading { background: #fffbeb; color: #a16207; }
    .alert.error { background: #fff1f2; color: #be123c; }
    label { display: block; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: #334155; }
    .search-row { display: flex; gap: 10px; }
    .input-wrap { position: relative; flex: 1; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 18px; pointer-events: none; }
    input { width: 100%; border: 1px solid #cbd5e1; border-radius: 18px; padding: 14px 16px 14px 40px; font-size: 18px; outline: none; }
    input:focus { border-color: #64748b; }
    button { cursor: pointer; border: none; font-family: inherit; }
    .btn-primary { border-radius: 18px; padding: 0 20px; font-weight: 700; color: white; background: linear-gradient(to right, #2563eb, #4338ca); box-shadow: 0 8px 18px rgba(37,99,235,0.2); white-space: nowrap; }
    .result { margin-top: 18px; overflow: hidden; }
    .result-body { padding: 16px; }
    .img-box { width: 100%; height: 260px; background: white; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #e2e8f0; }
    .img-box img { width: 100%; height: 100%; object-fit: contain; background: white; }
    .top-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .muted { color: #64748b; font-size: 14px; margin: 0 0 4px; }
    .code { font-size: 34px; font-weight: 700; margin: 0; }
    .stock { background: #ecfdf5; color: #047857; border-radius: 999px; padding: 8px 12px; font-size: 14px; font-weight: 700; white-space: nowrap; }
    .info-box { margin-top: 16px; border-radius: 18px; background: linear-gradient(to right, #2563eb, #4338ca); padding: 16px; color: white; box-shadow: 0 10px 20px rgba(37,99,235,0.2); }
    .info-label { font-size: 13px; color: #dbeafe; margin: 0 0 6px; }
    .info-value { font-size: 30px; font-weight: 700; margin: 0; }
    .store-section { margin-top: 14px; }
    .store-section-title { margin: 0 0 8px; font-size: 15px; font-weight: 700; color: #334155; }
    .store-list, .store-choice-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .store-item, .store-choice-btn { border: 1px solid #e2e8f0; border-radius: 14px; padding: 10px 12px; font-size: 15px; font-weight: 600; background: white; width: 100%; text-align: left; }
    .store-item-name { font-size: 15px; font-weight: 700; color: #0f172a; }
    .store-item-meta, .store-choice-sub, .contact-line { margin-top: 6px; font-size: 14px; font-weight: 500; color: #475569; line-height: 1.5; }
    .store-item-gallery { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .store-item-thumb { border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; background: white; }
    .store-item-thumb img { width: 100%; height: 74px; object-fit: contain; display: block; background: white; }
    .store-item-thumb-code { padding: 6px 6px 7px; font-size: 12px; font-weight: 700; text-align: center; color: #334155; border-top: 1px solid #e2e8f0; }
    .size-button { margin-top: 10px; display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: 14px; padding: 0; font-size: 18px; font-weight: 600; background: transparent; color: #0f172a; cursor: pointer; }
    .size-button .hint { font-size: 13px; color: #64748b; font-weight: 500; }
    .related-box { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 14px; }
    .related-title { margin: 0 0 10px; font-size: 16px; font-weight: 700; }
    .date-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .date-item { border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; background: white; }
    .date-item-btn { cursor: pointer; padding: 0; text-align: left; width: 100%; }
    .date-item img { width: 100%; height: 120px; object-fit: contain; background: white; display: block; border-bottom: 1px solid #e2e8f0; }
    .date-item-body { padding: 10px; }
    .date-code { font-size: 16px; font-weight: 700; margin: 0; }
    .date-meta { margin-top: 4px; font-size: 13px; color: #64748b; line-height: 1.4; }
    .empty { padding: 32px 22px; text-align: center; }
    .empty-icon { width: 64px; height: 64px; border-radius: 999px; background: #f1f5f9; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .empty h2 { margin: 0; font-size: 24px; }
    .empty p { margin: 8px 0 0; color: #64748b; font-size: 15px; line-height: 1.5; }
    .match-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .match-btn { border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; background: white; text-align: left; padding: 0; width: 100%; }
    .match-btn img { width: 100%; height: 110px; object-fit: contain; background: white; border-bottom: 1px solid #e2e8f0; display: block; }
    .match-body { padding: 10px; }
    .match-code { margin: 0; font-size: 16px; font-weight: 700; color: #0f172a; }
    .match-meta { margin-top: 4px; font-size: 13px; color: #64748b; line-height: 1.35; }

    .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .tab-btn { border-radius: 18px; padding: 12px 10px; font-weight: 700; background: white; color: #334155; border: 1px solid #cbd5e1; box-shadow: 0 6px 14px rgba(15,23,42,0.06); }
    .tab-btn.active { color: white; background: linear-gradient(to right, #2563eb, #4338ca); border: none; }
    .inventory-mini { margin-top: 14px; border-radius: 18px; background: #f8fafc; border: 1px solid #dbeafe; padding: 14px; }
    .inventory-title { margin: 0 0 10px; font-size: 16px; font-weight: 700; color: #0f172a; }
    .inventory-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .inventory-kpi { border-radius: 14px; padding: 10px; background: white; border: 1px solid #e2e8f0; }
    .inventory-kpi-label { margin: 0 0 4px; font-size: 12px; color: #64748b; }
    .inventory-kpi-value { margin: 0; font-size: 20px; font-weight: 700; color: #0f172a; }
    .inventory-note { margin-top: 8px; font-size: 13px; color: #64748b; line-height: 1.4; }
    .tonkho-tools { display: flex; gap: 10px; margin-bottom: 12px; }
    .tonkho-search-row { display: grid; grid-template-columns: 1fr 76px; gap: 8px; }
    .tonkho-search-btn { border-radius: 14px; padding: 10px 8px; font-weight: 700; color: white; background: linear-gradient(to right, #2563eb, #4338ca); }
    .tonkho-tools select, .tonkho-tools input { border: 1px solid #cbd5e1; border-radius: 14px; padding: 10px 12px; font-size: 15px; outline: none; width: 100%; }
    .tonkho-summary { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
    .tonkho-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 12px; }
    .tonkho-label { margin: 0 0 4px; color: #64748b; font-size: 12px; }
    .tonkho-value { margin: 0; font-size: 22px; font-weight: 700; color: #0f172a; }
    .tonkho-table-wrap { overflow: auto; border: 1px solid #e2e8f0; border-radius: 16px; background: white; max-height: 520px; }
    .tonkho-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 760px; }
    .tonkho-table th, .tonkho-table td { padding: 9px 10px; border-bottom: 1px solid #e2e8f0; text-align: left; white-space: nowrap; }
    .tonkho-table th { background: #f1f5f9; position: sticky; top: 0; z-index: 1; }
    .low-stock { color: #be123c; font-weight: 700; }
    .high-stock { color: #047857; font-weight: 700; }

    .calc-form { display: flex; flex-direction: column; gap: 12px; }
    .calc-form select, .calc-form input { width: 100%; border: 1px solid #cbd5e1; border-radius: 18px; padding: 14px 16px; font-size: 16px; outline: none; background: white; }
    .calc-form select:focus, .calc-form input:focus { border-color: #64748b; }
    .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .calc-btn { border-radius: 18px; padding: 14px 16px; font-weight: 700; color: white; background: linear-gradient(to right, #2563eb, #4338ca); box-shadow: 0 8px 18px rgba(37,99,235,0.2); }
    .calc-result { margin-top: 16px; border-radius: 18px; background: #f8fafc; border: 1px solid #dbeafe; padding: 14px; }
    .calc-result-title { margin: 0 0 10px; font-size: 16px; font-weight: 700; color: #0f172a; }
    .calc-result-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .calc-kpi { border-radius: 14px; padding: 10px; background: white; border: 1px solid #e2e8f0; }
    .calc-kpi-label { margin: 0 0 4px; font-size: 12px; color: #64748b; }
    .calc-kpi-value { margin: 0; font-size: 20px; font-weight: 700; color: #0f172a; }
    .calc-total { margin-top: 12px; border-radius: 18px; background: linear-gradient(to right, #2563eb, #4338ca); color: white; padding: 14px; }
    .calc-total p { margin: 0; }
    .calc-total-value { margin-top: 4px !important; font-size: 28px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="icon">M C</div>
      <div>
        <h1 class="title">Báo Cáo Thị Trường</h1>
        <p class="subtitle">Tổng Kho Gạch Minh Chiến</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tabMarketBtn" type="button">🔎 Tra cứu</button>
      <button class="tab-btn" id="tabStockBtn" type="button">📦 Tồn kho</button>
      <button class="tab-btn" id="tabCalcBtn" type="button">🧮 Tính</button>
    </div>

    <div class="card" id="searchCard">
      <div id="loadingAlert" class="alert loading">Đang tải dữ liệu từ Tiền Minh Chiến</div>
      <div id="errorAlert" class="alert error">Không đọc được dữ liệu từ Tiền Minh Chiến</div>

      <label for="codeInput">Nhập mã, ngày, kích thước hoặc tên cửa hàng</label>
      <div class="search-row">
        <div class="input-wrap">
          <div class="search-icon">🔎</div>
          <input id="codeInput" value="" placeholder="Tìm mã hoặc tên hàng" inputmode="search" />
        </div>
        <button type="button" class="btn-primary" id="searchBtn">Tra cứu</button>
      </div>
    </div>

    <div class="result" id="resultBox"></div>
    <div class="result" id="tonKhoBox" style="display:none;"></div>

    <div class="card" id="calcBox" style="display:none;">
      <div class="top-row">
        <div>
          <p class="muted">Công cụ</p>
          <h2 class="code" style="font-size:28px;">Tính gạch</h2>
        </div>
        <span class="stock">m² / thùng</span>
      </div>

      <div class="calc-form">
        <div>
          <label for="calcSizeSelect">Kích thước</label>
          <select id="calcSizeSelect">
            <option value="15x50">15x50</option>
            <option value="20x40">20x40</option>
            <option value="25x50">25x50</option>
            <option value="30x30">30x30</option>
            <option value="30x60">30x60</option>
            <option value="40x40">40x40</option>
            <option value="40x80">40x80</option>
            <option value="50x50">50x50</option>
            <option value="60x60">60x60</option>
            <option value="60x120">60x120</option>
            <option value="80x80">80x80</option>
            <option value="100x100">100x100</option>
            <option value="custom">Khác</option>
          </select>
          <input id="calcCustomSize" placeholder="Nhập kích thước khác, ví dụ 33x33" style="display:none; margin-top:8px;" />
        </div>

        <div class="calc-row">
          <div>
            <label for="calcTilesPerBox">Viên / thùng</label>
            <input type="number" id="calcTilesPerBox" placeholder="Ví dụ 11" min="1" inputmode="decimal" />
          </div>
          <div>
            <label for="calcInputType">Kiểu nhập</label>
            <select id="calcInputType">
              <option value="m2">Nhập m²</option>
              <option value="box">Nhập thùng</option>
            </select>
          </div>
        </div>

        <div>
          <label for="calcInputValue" id="calcInputLabel">Số m² cần dùng</label>
          <input type="number" id="calcInputValue" placeholder="Nhập số lượng" min="0" inputmode="decimal" />
        </div>

        <div class="calc-row">
          <div>
            <label for="calcPriceType">Loại giá</label>
            <select id="calcPriceType">
              <option value="m2">Giá theo m²</option>
              <option value="box">Giá theo thùng</option>
              <option value="tile">Giá theo viên</option>
            </select>
          </div>
          <div>
            <label for="calcPriceValue">Đơn giá</label>
            <input type="number" id="calcPriceValue" placeholder="Nhập giá" min="0" inputmode="decimal" />
          </div>
        </div>

        <div class="calc-row">
          <div>
            <label>Thùng điểm</label>
            <input type="number" id="calcDiemBox" placeholder="Số thùng điểm" min="0" />
          </div>
          <div>
            <label>Giá viên điểm</label>
            <input type="number" id="calcDiemPrice" placeholder="Giá / viên" min="0" />
          </div>
        </div>

        <button type="button" class="calc-btn" id="calcBtn">Tính kết quả</button>
      </div>

      <div class="calc-result" id="calcResult">
        <h3 class="calc-result-title">Kết quả sẽ hiển thị ở đây</h3>
        <div class="inventory-note">Nhập kích thước, viên/thùng, số lượng và giá để tính.</div>
      </div>
    </div>
    <div class="footer-box" id="footerBox">Dữ liệu lấy từ Tiền Minh Chiến</div>
  </div>

  <script>
    const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1s6r-yM4PcE3aczLZwk0r3SVaeJlWWyEsdjYvtup-hWw/edit?usp=sharing";
    const FALLBACK_IMAGE = "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80";

    let tileData = [];
    let tonKhoData = [];
    let giaData = [];
    let rawRows = [];
    let allStores = [];
    let currentResult = null;
    let searched = false;
    let selectedSize = "";
    let selectedStoreKey = "";
    let selectedStoreMatches = [];
    let inventoryResultCode = "";

    const areaOrder = { "đức hoà": 1, "đức hòa": 1, "đức huệ": 2, "củ chi": 3, "tây ninh": 4 };
    const codeInput = document.getElementById("codeInput");
    const resultBox = document.getElementById("resultBox");
    const loadingAlert = document.getElementById("loadingAlert");
    const errorAlert = document.getElementById("errorAlert");
    const searchBtn = document.getElementById("searchBtn");
    const tabMarketBtn = document.getElementById("tabMarketBtn");
    const tabStockBtn = document.getElementById("tabStockBtn");
    const tabCalcBtn = document.getElementById("tabCalcBtn");
    const searchCard = document.getElementById("searchCard");
    const tonKhoBox = document.getElementById("tonKhoBox");
    const calcBox = document.getElementById("calcBox");
    const footerBox = document.getElementById("footerBox");

    function normalizeText(text) { return String(text || "").trim().toLowerCase(); }
    function toDisplayText(text) {
      const value = String(text || "").trim().toLowerCase();
      if (!value) return "";
      return value.split(" ").filter(Boolean).map((w) => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
    }
    function parseSizeValue(sizeText) {
      const text = normalizeText(sizeText).replace(/\s+/g, "");
      const parts = text.split("x");
      if (parts.length !== 2) return 999999;
      const a = Number(parts[0]) || 0;
      const b = Number(parts[1]) || 0;
      return a * 1000 + b;
    }
    function parseDateValue(dateText) {
      const text = String(dateText || "").trim();
      if (!text) return 0;
      const parts = text.split(/[\/\-.]/).map((i) => i.trim()).filter(Boolean);
      if (parts.length !== 3) return 0;
      let day = Number(parts[0]);
      let month = Number(parts[1]);
      let year = Number(parts[2]);
      if (!day || !month || !year) return 0;
      if (year < 100) year += 2000;
      return year * 10000 + month * 100 + day;
    }
    function getGoogleSheetCsvUrl(sheetUrl) {
      const match = String(sheetUrl || "").match(/\/d\/([a-zA-Z0-9-_]+)/);
      if (!match) return "";
      return `https://docs.google.com/spreadsheets/d/${match[1]}/gviz/tq?tqx=out:csv&gid=0`;
    }

    function getGoogleSheetId(sheetUrl) {
      const match = String(sheetUrl || "").match(/\/d\/([a-zA-Z0-9-_]+)/);
      return match ? match[1] : "";
    }
    function getTonKhoJsonUrl(sheetUrl) {
      const id = getGoogleSheetId(sheetUrl);
      return id ? `https://opensheet.elk.sh/${id}/${encodeURIComponent("TỒN KHO")}` : "";
    }
    function getGiaJsonUrl(sheetUrl) {
      const id = getGoogleSheetId(sheetUrl);
      return id ? `https://opensheet.elk.sh/${id}/${encodeURIComponent("GIÁ")}` : "";
    }

    function mapGiaRows(rows) {
      return rows.map(r => ({
        code: String(r["Mã hàng"] || r["Ma hang"] || "").trim().toUpperCase(),
        size: r["Kích thước"] || r["Kích thướt"] || r["Kich thuoc"] || r["Kich thuot"] || r["KT"] || r["kt"] || "",
        price: r["Giá tiền"] || r["Gia tien"] || "",
        image: r["Hình ảnh"] || r["Hinh anh"] || ""
      })).filter(r => r.code);
    }

    async function loadGia() {
      try {
        const url = getGiaJsonUrl(GOOGLE_SHEET_URL);
        if (!url) return;
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error();
        const json = await res.json();
        giaData = mapGiaRows(json);
      } catch (e) {
        giaData = [];
        console.error("Lỗi load giá:", e);
      }
    }

    function parseNumberFlexible(value) {
      let text = String(value || "").trim().replace(/\./g, "").replace(/,/g, ".");
      if (/^\(.+\)$/.test(text)) text = "-" + text.slice(1, -1);
      const n = Number(text);
      return Number.isFinite(n) ? n : 0;
    }
    function pick(row, names) {
      for (const name of names) {
        if (row[name] !== undefined) return row[name];
        const found = Object.keys(row).find(k => normalizeText(k) === normalizeText(name));
        if (found) return row[found];
      }
      return "";
    }
    function mapTonKhoRows(rows) {
      return rows.map((row) => ({
        brand: pick(row, ["Hãng", "Hang"]),
        code: String(pick(row, ["Mã hàng", "Ma hang", "Mã", "Ma"]) || "").trim().toUpperCase(),
        name: pick(row, ["Tên hàng", "Ten hang", "Tên", "Ten"]),
        dauKy: parseNumberFlexible(pick(row, ["Đầu kỳ", "Dau ky"])),
        nhap: parseNumberFlexible(pick(row, ["Nhập", "Nhap"])),
        xuat: parseNumberFlexible(pick(row, ["Xuất", "Xuat"])),
        ton: parseNumberFlexible(pick(row, ["Tồn", "Ton"])),
        giaVon: parseNumberFlexible(pick(row, ["Giá vốn", "Gia von"])),
        thung: parseNumberFlexible(pick(row, ["Thùng", "Thung"])),
        vien: parseNumberFlexible(pick(row, ["Viên", "Vien"])),
        tienVon: parseNumberFlexible(pick(row, ["Tiền vốn", "Tien von"])),
        thoiGian: pick(row, ["Thời gian", "Thoi gian"]) || ""
      })).filter(row => row.code && row.code !== "MÃ HÀNG" && row.name);
    }
    function findInventoryByCode(code) {
      const normalized = String(code || "").trim().toUpperCase();
      return tonKhoData.find(row => row.code === normalized) || null;
    }

    function findGiaByCode(code) {
      const normalized = String(code || "").trim().toUpperCase();
      return giaData.find(row => row.code === normalized) || null;
    }
    function formatNumber(value) {
      return Number(value || 0).toLocaleString("vi-VN");
    }
    async function loadTonKho() {
      try {
        const url = getTonKhoJsonUrl(GOOGLE_SHEET_URL);
        if (!url) return;
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("Không đọc được sheet TỒN KHO");
        const json = await response.json();
        tonKhoData = mapTonKhoRows(json);
      } catch (e) {
        tonKhoData = [];
        console.error("Lỗi tải tồn kho:", e);
      }
    }
    function renderInventoryMini(code) {
      const item = findInventoryByCode(code);
      if (!item) {

            <div class="tonkho-card"><p class="tonkho-label">Tổng nhập</p><p class="tonkho-value">${formatNumber(sum("nhap"))}</p></div>
            <div class="tonkho-card"><p class="tonkho-label">Tổng xuất</p><p class="tonkho-value">${formatNumber(sum("xuat"))}</p></div>
            <div class="tonkho-card"><p class="tonkho-label">Tổng thùng</p><p class="tonkho-value">${formatNumber(sum("thung"))}</p></div>
            <div class="tonkho-card"><p class="tonkho-label">Tổng viên</p><p class="tonkho-value">${formatNumber(sum("vien"))}</p></div>

    function switchTab(tab) {

    function showLoading(show) { loadingAlert.style.display = show ? "block" : "none"; }
    function showError(message) {
      if (!message) { errorAlert.style.display = "none"; return; }
      errorAlert.textContent = message;
      errorAlert.style.display = "block";
    }

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') { current += '"'; i += 1; }
          else { inQuotes = !inQuotes; }
        } else if (char === "," && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }

    function csvToRows(text) {
      const lines = String(text || "").split(String.fromCharCode(10)).map((line) => line.replaceAll(String.fromCharCode(13), "").trim()).filter(Boolean);
      if (lines.length < 2) return [];
      const headers = parseCsvLine(lines[0]).map((item) => normalizeText(item));
      return lines.slice(1).map((line) => {
        const cols = parseCsvLine(line);
        const row = {};
        headers.forEach((header, index) => { row[header] = cols[index] || ""; });
        return row;
      });
    }

    function mapSheetRows(rows) {
      return rows.map((row) => {
        const dateText = row.date || row.data || row["ngày"] || row["ngay"] || row["ngày phát"] || row["ngay phat"] || "";
        return {
          code: row.code || row["mã"] || row["ma"] || row["mã số"] || row["ma so"] || "",
          size: row.size || row["kích thước"] || row["kich thuoc"] || row["kt"] || "",
          price: row.price || row["giá"] || row["gia"] || row["price"] || row["giá tiền"] || row["gia tien"] || row["đơn giá"] || row["don gia"] || row["giá bán"] || row["gia ban"] || "",
          quantity: Number(row.quantity || row["số lượng"] || row["so luong"] || 1) || 1,
          image: row.image || row["hình ảnh"] || row["hinh anh"] || row["ảnh"] || row["anh"] || "",
          store: row.store || row["cửa hàng"] || row["cua hang"] || row["tên cửa hàng"] || row["ten cua hang"] || "",
          area: row.area || row["khu vực"] || row["khu vuc"] || row["địa điểm"] || row["dia diem"] || "",
          phone: row.phone || row["sđt"] || row["sdt"] || row["số điện thoại"] || row["so dien thoai"] || "",
          address: row.address || row["địa chỉ nhà"] || row["dia chi nha"] || row["địa chỉ"] || row["dia chi"] || "",
          date: dateText,
          dateValue: parseDateValue(dateText),
        };
      });
    }

    function sortStoresList(list) {
      return [...list].sort((a, b) => {
        const orderA = areaOrder[normalizeText(a.area)] ?? 999;
        const orderB = areaOrder[normalizeText(b.area)] ?? 999;
        if (orderA !== orderB) return orderA - orderB;
        return a.store.localeCompare(b.store, "vi");
      });
    }

    function buildAllStores(rows) {
      const map = new Map();
      rows.forEach((row) => {
        const store = String(row.store || "").trim();
        const area = String(row.area || "").trim();
        if (!store) return;
        const key = `${normalizeText(store)}|||${normalizeText(area)}`;
        if (!map.has(key)) map.set(key, { store: toDisplayText(store), area: toDisplayText(area) });
      });
      return sortStoresList(Array.from(map.values()));
    }

    function groupTiles(rows) {
      const grouped = new Map();
      rows.forEach((row) => {
        const code = String(row.code || "").trim().toUpperCase();
        if (!code) return;

        // Trang tính1 chỉ dùng để lấy thông tin đã phát cửa hàng.
        // Ảnh + kích thước + giá tiền sẽ lấy từ sheet GIÁ, không lấy từ Trang tính1 nữa.
        if (!grouped.has(code)) grouped.set(code, { code, size: "", price: "", priceDateValue: 0, image: "", stores: [] });
        const item = grouped.get(code);

        const store = String(row.store || "").trim();
        const area = String(row.area || "").trim();
        if (store) {
          const ns = normalizeText(store);
          const na = normalizeText(area);
          const exists = item.stores.some((entry) => normalizeText(entry.store) === ns && normalizeText(entry.area) === na && entry.date === row.date);
          if (!exists) item.stores.push({ store: toDisplayText(store), area: toDisplayText(area), date: row.date || "" });
        }
      });

      // Merge ảnh + kích thước + giá từ sheet GIÁ
      grouped.forEach(item => {
        const g = giaData.find(x => x.code === item.code);
        if (g) {
          item.size = g.size || "";
          item.price = g.price || "";
          item.image = g.image || "";
        }
      });

      return Array.from(grouped.values()).map((item) => ({ ...item, stores: sortStoresList(item.stores) })).sort((a, b) => a.code.localeCompare(b.code));
    }

    function groupDateStores(rows) {
      const grouped = new Map();
      rows.forEach((entry) => {
        const store = String(entry.store || "").trim();
        const area = String(entry.area || "").trim();
        if (!store) return;
        const key = `${normalizeText(store)}|||${normalizeText(area)}`;
        if (!grouped.has(key)) grouped.set(key, { store: toDisplayText(store), area: toDisplayText(area), totalCodes: 0, sizes: new Map(), codeMap: new Map() });
        const item = grouped.get(key);
        const qty = Math.max(1, Number(entry.quantity) || 1);
        const codeLower = String(entry.code || "").trim().toLowerCase();
        const codeUpper = String(entry.code || "").trim().toUpperCase();
        const g = findGiaByCode(codeUpper);
        const size = g && g.size ? g.size : "Chưa có kích thước";
        item.totalCodes += 1;
        if (!item.sizes.has(size)) item.sizes.set(size, { size, quantity: 0, codes: [] });
        const sizeItem = item.sizes.get(size);
        sizeItem.quantity += qty;
        if (codeLower) sizeItem.codes.push(codeLower);
        if (codeUpper && !item.codeMap.has(codeUpper)) {
          const g2 = findGiaByCode(codeUpper);
          item.codeMap.set(codeUpper, { code: codeUpper, image: g2 && g2.image ? g2.image : "" });
        }
      });
      return Array.from(grouped.values()).map((item) => ({ ...item, sizes: Array.from(item.sizes.values()), codes: Array.from(item.codeMap.values()) })).sort((a, b) => {
        if (b.totalCodes !== a.totalCodes) return b.totalCodes - a.totalCodes;
        const areaA = areaOrder[normalizeText(a.area)] ?? 999;
        const areaB = areaOrder[normalizeText(b.area)] ?? 999;
        if (areaA !== areaB) return areaA - areaB;
        return a.store.localeCompare(b.store, "vi");
      });
    }

    function buildDateStoreHtml(item) {
      const lines = item.sizes.map((sizeItem) => `${sizeItem.quantity} viên ${sizeItem.size}: ${sizeItem.codes.join(", ")}`).join("<br>");
      const galleryHtml = (item.codes || []).map((codeItem) => {
        const image = codeItem.image || FALLBACK_IMAGE;
        return `<div class="store-item-thumb"><img src="${image}" alt="${codeItem.code}"><div class="store-item-thumb-code">${codeItem.code}</div></div>`;
      }).join("");
      return `<div class="store-item"><div class="store-item-name">${item.store}${item.area ? ` - ${item.area}` : ""}</div><div class="store-item-meta">Đã phát<br>${lines}</div>${galleryHtml ? `<div class="store-item-gallery">${galleryHtml}</div>` : ""}</div>`;
    }

    function buildStoreInventory(storeKey) {
      const rows = rawRows.filter((entry) => `${normalizeText(entry.store)}|||${normalizeText(entry.area)}` === storeKey);
      if (!rows.length) return null;

      const latestRow = [...rows].sort((a, b) => (b.dateValue || 0) - (a.dateValue || 0))[0];
      const latestPhone = latestRow && latestRow.phone ? latestRow.phone : "đang cập nhật";
      const latestAddress = latestRow && latestRow.address ? latestRow.address : "đang cập nhật";

      const byCode = new Map();
      rows.forEach((entry) => {
        const code = String(entry.code || "").trim().toUpperCase();
        if (!code) return;
        if (!byCode.has(code)) {
          const g = findGiaByCode(code);
          byCode.set(code, { code, size: g && g.size ? g.size : "", image: g && g.image ? g.image : "" });
        }
      });
      const bySize = new Map();
      Array.from(byCode.values()).forEach((item) => {
        const size = item.size || "Chưa có kích thước";
        if (!bySize.has(size)) bySize.set(size, []);
        bySize.get(size).push(item);
      });
      const sizes = Array.from(bySize.entries())
        .map(([size, items]) => ({ size, items: items.sort((a, b) => a.code.localeCompare(b.code)) }))
        .sort((a, b) => parseSizeValue(a.size) - parseSizeValue(b.size));
      const first = rows[0];
      return {
        store: toDisplayText(first.store || ""),
        area: toDisplayText(first.area || ""),
        phone: latestPhone,
        address: latestAddress,
        sizes,
      };
    }

    function renderStoreInventory(inventory) {
      const sectionsHtml = inventory.sizes.map((group) => {
        const itemsHtml = group.items.map((item) => {
          const image = item.image || FALLBACK_IMAGE;
          return `<div class="date-item"><img src="${image}" alt="${item.code}"><div class="date-item-body"><p class="date-code">${item.code}</p><div class="date-meta">${group.size}</div></div></div>`;
        }).join("");
        return `<div class="related-box" style="margin-top:14px;"><h3 class="related-title">${group.size}</h3><div class="date-grid">${itemsHtml}</div></div>`;
      }).join("");
      const totalCodes = inventory.sizes.reduce((sum, group) => sum + group.items.length, 0);
      resultBox.innerHTML = `
        <div class="result-body">
          <div class="top-row">
            <div>
              <p class="muted">Cửa hàng</p>
              <h2 class="code" style="font-size:28px;">${inventory.store}</h2>
            </div>
            <span class="stock">${inventory.area}</span>
          </div>
          <div class="contact-line"><strong>SĐT:</strong> ${inventory.phone && inventory.phone !== "đang cập nhật" ? `<a href="tel:${inventory.phone}" style="color:#2563eb; font-weight:700; text-decoration:none;">${inventory.phone}</a>` : "đang cập nhật"}</div>
          <div class="contact-line"><strong>Địa chỉ:</strong> ${inventory.address && inventory.address !== "đang cập nhật" ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(inventory.address)}" target="_blank" style="color:#2563eb; font-weight:700; text-decoration:none;">${inventory.address}</a>` : "đang cập nhật"}</div>
          <div class="info-box">
            <p class="info-label">Mẩu đang giữ</p>
            <p class="info-value">${totalCodes} mẩu</p>
          </div>
          ${sectionsHtml || '<div class="store-item">Chưa có dữ liệu</div>'}
        </div>
      `;
    }

    function makeTileFromGia(g) {
      return {
        code: g.code,
        size: g.size || "",
        price: g.price || "",
        image: g.image || "",
        stores: []
      };
    }

    function getAllSearchItems() {
      const map = new Map();
      tileData.forEach(item => map.set(item.code, item));
      giaData.forEach(g => {
        if (!map.has(g.code)) map.set(g.code, makeTileFromGia(g));
      });
      return Array.from(map.values()).sort((a, b) => a.code.localeCompare(b.code));
    }

    function getSearchItemByCode(code) {
      const normalized = String(code || "").trim().toUpperCase();
      return getAllSearchItems().find(item => item.code === normalized) || null;
    }

    function renderCodeMatches(matches, keyword) {
      const listHtml = matches.slice(0, 40).map((item) => {
        const image = item.image || FALLBACK_IMAGE;
        const inventory = findInventoryByCode(item.code);
        const stockText = inventory ? `Tồn kho: ${formatNumber(inventory.ton)}` : "Tồn kho: chưa có";
        const meta = `${item.size || "Chưa có kích thước"}${item.price ? " - " + item.price : ""}<br>${stockText}`;
        return `<button type="button" class="match-btn" data-code="${item.code}"><img src="${image}" alt="${item.code}"><div class="match-body"><p class="match-code">${item.code}</p><div class="match-meta">${meta}</div></div></button>`;
      }).join("");

      resultBox.innerHTML = `
        <div class="result-body">
          <div class="top-row">
            <div>
              <p class="muted">Kết quả liên quan</p>
              <h2 class="code" style="font-size:28px;">${keyword}</h2>
            </div>
            <span class="stock">${matches.length} mã</span>
          </div>
          <div class="match-grid">${listHtml}</div>
        </div>
      `;

      resultBox.querySelectorAll(".match-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const code = btn.getAttribute("data-code") || "";
          const found = getSearchItemByCode(code);
          if (found) {
            currentResult = found;
            selectedStoreKey = "";
            selectedStoreMatches = [];
            selectedSize = found.size || "";
            inventoryResultCode = "";
            renderResult();
          }
        });
      });
    }

    function renderResult() {
      if (!currentResult && inventoryResultCode) {
        renderInventoryOnly(inventoryResultCode);
        return;
      }
      if (!currentResult && !selectedSize && !selectedStoreKey && selectedStoreMatches.length > 0) {
        const listHtml = selectedStoreMatches.map((item) => {
          const key = `${normalizeText(item.store)}|||${normalizeText(item.area)}`;
          return `<button type="button" class="store-choice-btn" data-store-key="${key}">${item.store}<span class="store-choice-sub">${item.area || "Chưa có khu vực"}</span></button>`;
        }).join("");
        resultBox.innerHTML = `<div class="result-body"><div class="top-row"><div><p class="muted">Chọn cửa hàng</p><h2 class="code" style="font-size:28px;">${codeInput.value.trim()}</h2></div><span class="stock">${selectedStoreMatches.length} cửa hàng</span></div><div class="store-choice-list">${listHtml}</div></div>`;
        resultBox.querySelectorAll('.store-choice-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            selectedStoreKey = btn.getAttribute('data-store-key') || '';
            selectedStoreMatches = [];
            renderResult();
          });
        });
        return;
      }

      if (!currentResult && !selectedSize && !selectedStoreKey && searched) {
        resultBox.innerHTML = `<div class="empty"><div class="empty-icon">🔎</div><h2>Không tìm thấy</h2><p>Anh/chị kiểm tra lại mã gạch, ngày, kích thước hoặc tên cửa hàng.</p></div>`;
        return;
      }
      if (!currentResult && !selectedSize && !selectedStoreKey && !searched) {
        resultBox.innerHTML = `<div class="empty"><div class="empty-icon">🔎</div><h2>Chưa tra cứu</h2><p>Nhập mã gạch(w24204), ngày(06-04-26), kích thước (60x60) hoặc tên cửa hàng để xem kết quả.</p></div>`;
        return;
      }
      if (!currentResult && selectedStoreKey) {
        const inventory = buildStoreInventory(selectedStoreKey);
        if (!inventory) {
          resultBox.innerHTML = `<div class="empty"><div class="empty-icon">🔎</div><h2>Không có dữ liệu cửa hàng</h2><p>Chưa tìm thấy mã nào ở cửa hàng này.</p></div>`;
          return;
        }
        renderStoreInventory(inventory);
        return;
      }
      if (!currentResult && selectedSize) {
        const dateItems = rawRows.filter((entry) => normalizeText(entry.date) === normalizeText(selectedSize));
        if (dateItems.length > 0) {
          const dateStores = groupDateStores(dateItems);
          const storeHtml = dateStores.map((item) => buildDateStoreHtml(item)).join("");
          const dailyCodeMap = new Map();
          dateItems.forEach((entry) => {
            const code = String(entry.code || "").trim().toUpperCase();
            if (!code) return;
            if (!dailyCodeMap.has(code)) {
              const g = findGiaByCode(code);
              dailyCodeMap.set(code, { code, size: g && g.size ? g.size : "", image: g && g.image ? g.image : "" });
            }
          });
          const dailyGallery = Array.from(dailyCodeMap.values()).map((item) => {
            const image = item.image || FALLBACK_IMAGE;
            return `<div class="date-item"><img src="${image}" alt="${item.code}"><div class="date-item-body"><p class="date-code">${item.code}</p><div class="date-meta">${item.size || ""}</div></div></div>`;
          }).join("");
          const issuedKeys = new Set(dateStores.map((entry) => `${normalizeText(entry.store)}|||${normalizeText(entry.area)}`));
          const unissuedStores = allStores.filter((entry) => !issuedKeys.has(`${normalizeText(entry.store)}|||${normalizeText(entry.area)}`));
          const unissuedHtml = unissuedStores.map((entry) => `<div class="store-item">${entry.store}${entry.area ? " - " + entry.area : ""}</div>`).join("");

          resultBox.innerHTML = `<div class="result-body"><div class="top-row"><div><p class="muted">Ngày phát</p><h2 class="code" style="font-size:28px;">${selectedSize}</h2></div><span class="stock">${dateStores.length} cửa hàng</span></div><div class="related-box" style="margin-top:0; border-top:none; padding-top:0;"><h3 class="related-title">Các mã đã phát</h3><div class="date-grid">${dailyGallery || '<div class="store-item">Chưa có dữ liệu</div>'}</div></div><div class="info-box" style="margin-top:12px;"><p class="info-label">Tổng số cửa hàng đã phát</p><p class="info-value">${dateStores.length} cửa hàng</p></div><div class="store-section"><h3 class="store-section-title">Cửa hàng đã phát</h3><div class="store-list">${storeHtml || '<div class="store-item">Chưa có dữ liệu</div>'}</div></div><div class="info-box" style="margin-top:12px;"><p class="info-label">Cửa hàng chưa phát</p><p class="info-value">${unissuedStores.length} nơi chưa phát</p></div><div class="store-section"><h3 class="store-section-title">Cửa hàng chưa phát</h3><div class="store-list">${unissuedHtml || '<div class="store-item">Không còn cửa hàng nào</div>'}</div></div></div>`;
          return;
        }
        const sizeItems = tileData.filter((entry) => normalizeText(entry.size) === normalizeText(selectedSize));
        const sizeHtml = sizeItems.map((entry) => {
          const image = entry.image || FALLBACK_IMAGE;
          const inventory = findInventoryByCode(entry.code);
          const stockText = inventory ? ` - Tồn kho: ${formatNumber(inventory.ton)}` : " - Tồn kho: chưa có";
          const meta = (entry.size || "") + stockText + (entry.price ? " - " + entry.price : "");
          return `<button type="button" class="date-item date-item-btn" data-code="${entry.code}"><img src="${image}" alt="${entry.code}"><div class="date-item-body"><p class="date-code">${entry.code}</p><div class="date-meta">${meta}</div></div></button>`;
        }).join("");
        resultBox.innerHTML = `<div class="result-body"><div class="top-row"><div><p class="muted">Kích thước</p><h2 class="code" style="font-size:28px;">${selectedSize}</h2></div><span class="stock">${sizeItems.length} mẫu</span></div><div class="related-box" style="margin-top:0; border-top:none; padding-top:0;"><h3 class="related-title">Các mẫu kích thước ${selectedSize}</h3><div class="date-grid">${sizeHtml || '<div class="store-item">Không có mẫu nào</div>'}</div></div></div>`;
        resultBox.querySelectorAll('.date-item-btn[data-code]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const code = btn.getAttribute('data-code') || '';
            const found = getSearchItemByCode(code);
            if (found) {
              currentResult = found;
              selectedStoreKey = "";
              selectedStoreMatches = [];
              selectedSize = found.size || "";
              renderResult();
            }
          });
        });
        return;
      }
      const issuedStores = currentResult.stores || [];
      const issuedKeys = new Set(issuedStores.map((entry) => `${normalizeText(entry.store)}|||${normalizeText(entry.area)}`));
      const unissuedStores = allStores.filter((entry) => !issuedKeys.has(`${normalizeText(entry.store)}|||${normalizeText(entry.area)}`));
      const issuedHtml = issuedStores.map((entry) => `<div class="store-item">${entry.store}${entry.area ? " - " + entry.area : ""}${entry.date ? " - " + entry.date : ""}</div>`).join("");
      const unissuedHtml = unissuedStores.map((entry) => `<div class="store-item">${entry.store}${entry.area ? " - " + entry.area : ""}</div>`).join("");
      const sizeLabel = (currentResult.size || "Chưa có kích thước") + (currentResult.price ? " - " + currentResult.price : "");
      const imageHtml = currentResult.image ? `<div class="img-box"><img id="productImg" src="${currentResult.image}" alt="${currentResult.code}"></div>` : "";
      const inventoryHtml = renderInventoryMini(currentResult.code);
      resultBox.innerHTML = `${imageHtml}<div class="result-body"><div class="top-row"><div><p class="muted">Mã gạch</p><h2 class="code">${currentResult.code}</h2></div><span class="stock">${issuedStores.length} cửa hàng</span></div><button type="button" class="size-button" id="sizeButton"><span>${sizeLabel}</span><span class="hint">Xem cùng kích thước</span></button>${inventoryHtml}<div class="info-box"><p class="info-label">Thông tin phát mẫu</p><p class="info-value">${issuedStores.length} nơi đã phát</p></div><div class="store-section"><h3 class="store-section-title">Cửa hàng đã phát</h3><div class="store-list">${issuedHtml || '<div class="store-item">Chưa có dữ liệu</div>'}</div></div><div class="info-box" style="margin-top:12px;"><p class="info-label">Cửa hàng chưa phát</p><p class="info-value">${unissuedStores.length} nơi chưa phát</p></div><div class="store-section"><h3 class="store-section-title">Cửa hàng chưa phát</h3><div class="store-list">${unissuedHtml || '<div class="store-item">Không còn cửa hàng nào</div>'}</div></div></div>`;
      const img = document.getElementById("productImg");
      if (img) img.onerror = () => { img.src = FALLBACK_IMAGE; };
      const sizeButton = document.getElementById("sizeButton");
      if (sizeButton) {
        sizeButton.onclick = () => {
          selectedStoreKey = "";
          selectedStoreMatches = [];
          selectedSize = currentResult ? currentResult.size : "";
          currentResult = null;
          renderResult();
        };
      }
    }

    function handleSearch() {
      const raw = codeInput.value.trim();
      const normalized = raw.toUpperCase();
      const normText = normalizeText(raw);
      searched = true;
      inventoryResultCode = "";

      // Ưu tiên nhận diện ngày trước khi tìm gần đúng theo mã
      const byDate = rawRows.filter((item) => normalizeText(item.date) === normalizeText(raw));
      if (byDate.length > 0) {
        currentResult = null;
        selectedStoreKey = "";
        selectedStoreMatches = [];
        selectedSize = byDate[0].date || raw;
        renderResult();
        return;
      }

      const allSearchItems = getAllSearchItems();
      const byCode = allSearchItems.find((item) => item.code === normalized) || null;
      if (byCode) {
        currentResult = byCode;
        selectedStoreKey = "";
        selectedStoreMatches = [];
        selectedSize = byCode.size || "";
        renderResult();
        return;
      }

      // Tìm gần đúng theo mã: nhập 255 sẽ ra NB255, ABC255...
      const matchedCodes = normText
        ? allSearchItems.filter((item) => normalizeText(item.code).includes(normText))
        : [];
      if (matchedCodes.length === 1) {
        currentResult = matchedCodes[0];
        selectedStoreKey = "";
        selectedStoreMatches = [];
        selectedSize = matchedCodes[0].size || "";
        renderResult();
        return;
      }
      if (matchedCodes.length > 1) {
        currentResult = null;
        selectedStoreKey = "";
        selectedStoreMatches = [];
        selectedSize = "";
        inventoryResultCode = "";
        renderCodeMatches(matchedCodes, raw);
        return;
      }

      if (findInventoryByCode(normalized)) {
        currentResult = null;
        selectedStoreKey = "";
        selectedStoreMatches = [];
        selectedSize = "";
        inventoryResultCode = normalized;
        renderResult();
        return;
      }

      const matchedStores = allStores.filter((s) => normalizeText(s.store).includes(normText));
      if (normText && matchedStores.length === 1) {
        currentResult = null;
        selectedSize = "";
        selectedStoreMatches = [];
        selectedStoreKey = `${normalizeText(matchedStores[0].store)}|||${normalizeText(matchedStores[0].area)}`;
        renderResult();
        return;
      }
      if (normText && matchedStores.length > 1) {
        currentResult = null;
        selectedSize = "";
        selectedStoreKey = "";
        selectedStoreMatches = matchedStores;
        renderResult();
        return;
      }

      const bySize = allSearchItems.filter((item) => normalizeText(item.size) === normalizeText(normalized));
      if (bySize.length > 0) {
        currentResult = null;
        selectedStoreKey = "";
        selectedStoreMatches = [];
        selectedSize = bySize[0].size || normalized;
        renderResult();
        return;
      }

      currentResult = null;
      selectedStoreKey = "";
      selectedStoreMatches = [];
      selectedSize = "";
      inventoryResultCode = "";
      renderResult();
    }

    async function loadSheet() {
      showLoading(true);
      showError("");
      try {
        const response = await fetch(getGoogleSheetCsvUrl(GOOGLE_SHEET_URL), { cache: "no-store" });
        if (!response.ok) throw new Error("Không đọc được dữ liệu từ Google Sheet");
        const text = await response.text();
        const parsed = csvToRows(text);
        const mapped = mapSheetRows(parsed);
        const grouped = groupTiles(mapped);
        if (!grouped.length) throw new Error("Google Sheet chưa có dữ liệu hợp lệ");
        tileData = grouped;
        rawRows = mapped;
        allStores = buildAllStores(mapped);
      } catch (e) {
        tileData = [];
        rawRows = [];
        allStores = [];
        showError((e && e.message) || "Lỗi tải dữ liệu");
      } finally {
        showLoading(false);
        renderResult();
      }
    }


    function getCalcSizeText() {
      const sizeSelect = document.getElementById("calcSizeSelect");
      const customSize = document.getElementById("calcCustomSize");
      return sizeSelect.value === "custom" ? customSize.value.trim() : sizeSelect.value;
    }

    function getCalcAreaPerTile() {
      const sizeText = getCalcSizeText().toLowerCase().replace(/\s+/g, "");
      const parts = sizeText.split("x").map(Number);
      if (parts.length !== 2 || !parts[0] || !parts[1]) return 0;
      return (parts[0] * parts[1]) / 10000;
    }

    function formatMoney(value) {
      return Math.round(Number(value || 0)).toLocaleString("vi-VN") + " đ";
    }

    function renderCalcError(message) {
      document.getElementById("calcResult").innerHTML = `<h3 class="calc-result-title">Chưa tính được</h3><div class="inventory-note">${message}</div>`;
    }

    function calculateTiles() {
      const areaPerTile = getCalcAreaPerTile();
      const tilesPerBox = Number(document.getElementById("calcTilesPerBox").value);
      const inputType = document.getElementById("calcInputType").value;
      const inputValue = Number(document.getElementById("calcInputValue").value);
      const priceType = document.getElementById("calcPriceType").value;
      const priceValue = Number(document.getElementById("calcPriceValue").value);

      if (!areaPerTile) { renderCalcError("Vui lòng chọn hoặc nhập kích thước đúng dạng 30x60."); return; }
      if (!tilesPerBox || tilesPerBox <= 0) { renderCalcError("Vui lòng nhập số viên / thùng."); return; }
      if (!inputValue || inputValue <= 0) { renderCalcError("Vui lòng nhập số lượng cần tính."); return; }

      let totalTiles = 0;
      let totalM2 = 0;

      if (inputType === "m2") {
        totalTiles = Math.ceil(inputValue / areaPerTile);
        totalM2 = totalTiles * areaPerTile;
      } else {
        totalTiles = Math.ceil(inputValue * tilesPerBox);
        totalM2 = totalTiles * areaPerTile;
      }

      const fullBoxes = Math.floor(totalTiles / tilesPerBox);
      const remainTiles = totalTiles % tilesPerBox;
      const boxDecimal = totalTiles / tilesPerBox;
      const m2PerBox = areaPerTile * tilesPerBox;
      

      // 👉 viên điểm (trừ khỏi tổng)
      const diemBox = Number(document.getElementById("calcDiemBox").value) || 0;
      const diemPrice = Number(document.getElementById("calcDiemPrice").value) || 0;
      const diemTiles = diemBox * tilesPerBox;

      // trừ viên điểm ra khỏi gạch thường
      let normalTiles = totalTiles - diemTiles;
      if (normalTiles < 0) normalTiles = 0;

      const normalBoxes = Math.floor(normalTiles / tilesPerBox);
      const normalRemain = normalTiles % tilesPerBox;
      const normalBoxDecimal = normalTiles / tilesPerBox;

      // tiền gạch thường
      let normalMoney = 0;
      if (priceType === "m2") normalMoney = (normalTiles * areaPerTile) * priceValue;
      else if (priceType === "box") normalMoney = normalBoxDecimal * priceValue;
      else if (priceType === "tile") normalMoney = normalTiles * priceValue;

      // tiền điểm
      const diemMoney = diemTiles * diemPrice;

      const totalMoney = normalMoney + diemMoney;

      document.getElementById("calcResult").innerHTML = `
        <h3 class="calc-result-title">Kết quả</h3>
        <div class="calc-result-grid">
          <div class="calc-kpi"><p class="calc-kpi-label">1 viên</p><p class="calc-kpi-value">${areaPerTile.toFixed(3)} m²</p></div>
          <div class="calc-kpi"><p class="calc-kpi-label">1 thùng</p><p class="calc-kpi-value">${m2PerBox.toFixed(2)} m²</p></div>
          <div class="calc-kpi"><p class="calc-kpi-label">Tổng m²</p><p class="calc-kpi-value">${totalM2.toFixed(2)}</p></div>
          <div class="calc-kpi"><p class="calc-kpi-label">Tổng viên</p><p class="calc-kpi-value">${formatNumber(totalTiles)}</p></div>
          <div class="calc-kpi"><p class="calc-kpi-label">Quy đổi</p><p class="calc-kpi-value">${fullBoxes} thùng + ${remainTiles} viên</p></div>
          <div class="calc-kpi"><p class="calc-kpi-label">Tính tiền theo</p><p class="calc-kpi-value">${priceType === "m2" ? "m²" : (priceType === "box" ? "thùng" : "viên")}</p></div>
        </div>
        <div class="calc-total">
          <p>Tiền gạch thường</p>
          <p>${formatMoney(normalMoney)}</p>
          <p>Tiền viên điểm</p>
          <p>${formatMoney(diemMoney)}</p>
          <p class="calc-total-value">Tổng: ${formatMoney(totalMoney)}</p>
        </div>
      `;
    }

    function setupCalcTab() {
      const sizeSelect = document.getElementById("calcSizeSelect");
      const customSize = document.getElementById("calcCustomSize");
      const inputType = document.getElementById("calcInputType");
      const inputLabel = document.getElementById("calcInputLabel");
      const calcBtn = document.getElementById("calcBtn");

      sizeSelect.addEventListener("change", () => {
        customSize.style.display = sizeSelect.value === "custom" ? "block" : "none";
      });
      inputType.addEventListener("change", () => {
        inputLabel.textContent = inputType.value === "m2" ? "Số m² cần dùng" : "Số thùng cần tính";
      });
      calcBtn.addEventListener("click", calculateTiles);
    }

    searchBtn.addEventListener("click", (e) => {
      e.preventDefault();
      handleSearch();
      setTimeout(() => codeInput.focus(), 0);
    });
    codeInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleSearch(); });
    // 🔥 TẮT realtime khi gõ (fix mobile)
    // Chỉ tìm khi bấm nút hoặc Enter
    codeInput.addEventListener("input", () => {
      // Không render lại liên tục nữa để tránh giật bàn phím trên điện thoại
    });

    tabMarketBtn.addEventListener("click", () => switchTab("market"));
    tabStockBtn.addEventListener("click", () => switchTab("stock"));
    tabCalcBtn.addEventListener("click", () => switchTab("calc"));

    async function initApp() {
      renderResult();

      // Quan trọng: phải load sheet GIÁ trước,
      // rồi mới load sheet chính để gộp giá + kích thước + hình ảnh theo mã.
      await loadGia();
      await Promise.all([loadSheet(), loadTonKho()]);

      renderResult();
    }

    setupCalcTab();
    initApp();
  </script>
</body>
</html>
